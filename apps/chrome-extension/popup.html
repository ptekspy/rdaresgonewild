<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Paid Politely Local Reddit Crawler</title>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">Paid Politely</p>
          <h1>Local Reddit Crawler</h1>
        </div>
        <div id="statusDot" class="dot" aria-label="Status"></div>
      </header>

      <label>
        Local DB writer
        <input id="writerBase" type="url" autocomplete="off" />
      </label>

      <div class="page-box">
        <small>Current tab</small>
        <span id="pageUrl">Open a Reddit page to crawl it.</span>
      </div>

      <section class="stats" aria-live="polite">
        <div>
          <span id="scrolls">0</span>
          <small>scrolls</small>
        </div>
        <div>
          <span id="parsed">0</span>
          <small>parsed</small>
        </div>
        <div>
          <span id="saved">0</span>
          <small>saved</small>
        </div>
      </section>

      <p id="message" class="message">Ready.</p>

      <div class="actions">
        <button id="start" type="button">Crawl page</button>
        <button id="stop" class="secondary" type="button">Stop</button>
      </div>

      <p class="hint">
        Start <code>pnpm crawler:local-db</code> before crawling. This extension parses visible Reddit post cards directly; it does not visit each post.
      </p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
