<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Paid Politely Reddit Stream Crawler</title>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">Paid Politely</p>
          <h1>Reddit Stream Crawler</h1>
        </div>
        <div id="statusDot" class="dot" aria-label="Status"></div>
      </header>

      <label>
        API endpoint
        <input id="apiBase" type="url" autocomplete="off" placeholder="https://api.paidpolitely.com" />
      </label>

      <div class="page-box">
        <small>Current tab</small>
        <span id="pageUrl">Open a Reddit page to crawl it.</span>
      </div>

      <section class="stats" aria-live="polite">
        <div>
          <span id="scrolls">0</span>
          <small>scrolls</small>
        </div>
        <div>
          <span id="links">0</span>
          <small>links</small>
        </div>
        <div>
          <span id="fetched">0</span>
          <small>fetched</small>
        </div>
        <div>
          <span id="saved">0</span>
          <small>saved</small>
        </div>
      </section>

      <p id="message" class="message">Ready.</p>

      <div class="actions">
        <button id="start" type="button">Crawl current page</button>
        <button id="stop" class="secondary" type="button">Stop</button>
      </div>

      <p class="hint">
        Works on reddit home, /new, subreddit feeds, sort pages, search results, and user pages. Each tab/window gets its own crawl state.
      </p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
