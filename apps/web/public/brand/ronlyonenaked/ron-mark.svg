<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Only One Naked mark</title>
  <desc id="desc">A non-explicit contrast-gallery icon with a single spotlight figure between dark and light panels.</desc>
  <defs>
    <linearGradient id="ron-bg" x1="80" y1="42" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1114"/>
      <stop offset="0.48" stop-color="#15191E"/>
      <stop offset="1" stop-color="#090B0E"/>
    </linearGradient>
    <linearGradient id="ron-accent" x1="124" y1="90" x2="398" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.46" stop-color="#37D67A"/>
      <stop offset="1" stop-color="#FF4F8B"/>
    </linearGradient>
    <radialGradient id="ron-glow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#F8FAFC" stop-opacity="0.34"/>
      <stop offset="0.44" stop-color="#37D67A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF4F8B" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
