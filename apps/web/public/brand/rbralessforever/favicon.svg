<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Braless Forever mark</title>
  <desc id="desc">Abstract rose heart-ribbon mark for Braless Forever.</desc>
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="82%">
      <stop offset="0" stop-color="#3A1828"/>
      <stop offset=".52" stop-color="#150B10"/>
      <stop offset="1" stop-color="#090507"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9CB3"/>
      <stop offset=".52" stop-color="#FF4F8B"/>
      <stop offset=".82" stop-color="#FFE45E"/>
      <stop offset="1" stop-color="#7AF6C5"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.5 0 0 .3 0 0 0.8 0 .55 0 0 0 .55 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <circle cx="264" cy="220" r="170" fill="#FF9CB3" opacity=".1"/>
  <circle cx="780" cy="760" r="220" fill="#FFE45E" opacity=".08"/>
  <g filter="url(#glow)">
    <path d="M250 469C310 265 587 240 684 404C763 537 706 730 512 833C318 730 201 586 250 469Z"
          fill="url(#ribbon)"/>
    <path d="M312 463C366 344 529 328 602 425C665 510 623 643 512 717C401 643 270 556 312 463Z"
          fill="#150B10" opacity=".44"/>
    <path d="M334 432C429 506 595 506 690 432" fill="none" stroke="#FFF2D4" stroke-width="52" stroke-linecap="round" opacity=".92"/>
    <path d="M381 614C453 666 571 666 643 614" fill="none" stroke="#FFE45E" stroke-width="32" stroke-linecap="round" opacity=".9"/>
  </g>
  <text x="512" y="905" text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72" font-weight="950" letter-spacing="-1" fill="#FFF2D4">BF</text>
</svg>
