<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 420" role="img" aria-labelledby="title desc">
  <title id="title">Braless Forever logo</title>
  <desc id="desc">A soft rose and gold catalogue-style wordmark for r/BralessForever.</desc>
  <defs>
    <linearGradient id="bfWord" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF2D4"/>
      <stop offset="0.42" stop-color="#FF9CB3"/>
      <stop offset="0.72" stop-color="#FFE45E"/>
      <stop offset="1" stop-color="#7AF6C5"/>
    </linearGradient>
    <linearGradient id="bfMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9CB3"/>
      <stop offset="0.52" stop-color="#FF4F8B"/>
      <stop offset="1" stop-color="#FFE45E"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.6 0 0 0.35 0 0 0.9 0 0.55 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1536" height="420" fill="none"/>

  <g transform="translate(64 54)" filter="url(#softGlow)">
    <circle cx="156" cy="156" r="142" fill="#FFFFFF" stroke="#FF9CB3" stroke-opacity=".28" stroke-width="3"/>
    <path d="M77 151C111 81 205 59 248 124C276 168 259 237 156 282C53 237 36 168 77 151Z"
          fill="url(#bfMark)" opacity=".98"/>
    <path d="M92 150C120 102 184 91 218 132C246 167 235 220 156 257C77 220 64 167 92 150Z"
          fill="#FFF2D4" opacity=".48"/>
    <path d="M98 146C137 173 177 173 216 146" fill="none" stroke="#FFF2D4" stroke-width="14" stroke-linecap="round" opacity=".88"/>
    <path d="M119 201C143 219 169 219 193 201" fill="none" stroke="#FFE45E" stroke-width="9" stroke-linecap="round" opacity=".85"/>
    <circle cx="107" cy="108" r="8" fill="#FFF2D4" opacity=".8"/>
    <circle cx="220" cy="228" r="6" fill="#7AF6C5" opacity=".7"/>
  </g>

  <g transform="translate(392 104)">
    <text x="0" y="88"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="94" font-weight="950" letter-spacing="-3" fill="url(#bfWord)">Braless</text>
    <text x="0" y="188"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="92" font-weight="950" letter-spacing="-3" fill="#150B10">Forever</text>
    <g transform="translate(2 228)">
      <rect x="0" y="0" width="328" height="42" rx="21" fill="#FF9CB3" fill-opacity=".13" stroke="#FF9CB3" stroke-opacity=".28"/>
      <text x="28" y="28"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="850" letter-spacing="4" fill="#FF9CB3">MODEL-LED CATALOG</text>
    </g>
  </g>
</svg>
